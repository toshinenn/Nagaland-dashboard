<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- PERSON 1: Change this title -->
  <title>Population, Births & Deaths — Nagaland</title>

  <!-- SheetJS: reads .xlsx files in the browser, no backend needed -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      background: #1a2e4a;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .topbar a {
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.85rem;
    }

    .topbar a:hover { text-decoration: underline; }

    .topbar h1 {
      font-size: 1rem;
      font-weight: 600;
      flex: 1;
    }

    /* ── Controls bar ── */
    .controls {
      background: #ffffff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #e2e8f0;
      flex-wrap: wrap;
    }

    .controls label {
      font-size: 0.85rem;
      color: #475569;
      font-weight: 600;
    }

    .controls select {
      padding: 7px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 0.88rem;
      color: #1e293b;
      background: white;
      min-width: 220px;
      cursor: pointer;
    }

    .controls select:focus {
      outline: none;
      border-color: #2563eb;
    }

    #sheet-info {
      margin-left: auto;
      font-size: 0.78rem;
      color: #94a3b8;
    }

    /* ── Main content ── */
    .content {
      padding: 24px;
    }

    #sheet-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a2e4a;
      margin-bottom: 16px;
    }

    /* ── Table wrapper: scrollable ── */
    .table-wrap {
      overflow-x: auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.82rem;
    }

    thead tr {
      background: #1a2e4a;
      color: white;
    }

    thead th {
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }

    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody tr:hover { background: #e0f2fe; }

    tbody td {
      padding: 8px 14px;
      border-bottom: 1px solid #e2e8f0;
      white-space: nowrap;
      color: #334155;
    }

    /* ── States ── */
    #status {
      padding: 40px;
      text-align: center;
      color: #64748b;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <!-- Top navigation bar -->
  <div class="topbar">
    <a href="../index.html">← Home</a>
    <!-- PERSON 1: Change this heading to match your file -->
    <h1>📊 Population, Births & Deaths — Nagaland</h1>
  </div>

  <!-- Sheet selector -->
  <div class="controls">
    <label for="sheet-select">Sheet:</label>
    <select id="sheet-select" disabled>
      <option>Loading...</option>
    </select>
    <span id="sheet-info"></span>
  </div>

  <!-- Table area -->
  <div class="content">
    <div id="sheet-title"></div>
    <div id="status">Loading Excel file…</div>
    <div class="table-wrap" id="table-container"></div>
  </div>

 <script>
  const container = document.getElementById("table-container");
  const status = document.getElementById("status");
  const sheetTitle = document.getElementById("sheet-title");
  const sheetInfo = document.getElementById("sheet-info");
  const select = document.getElementById("sheet-select");

  const p1Data = [
    {
      sl: 1,
      year: 1971,
      rural_population: 435982,
      rural_sex_ratio: 928,
      urban_population: 29073,
      urban_sex_ratio: 928,
      total_population: 465055,
      total_sex_ratio: 928,
      growth_female: 39.88,
      growth_male: 47.22,
      growth_person: 51.64
    },
    {
      sl: 2,
      year: 1981,
      rural_population: 602244,
      rural_sex_ratio: 899,
      urban_population: 52452,
      urban_sex_ratio: 899,
      total_population: 654696,
      total_sex_ratio: 899,
      growth_female: 50.05,
      growth_male: 68.84,
      growth_person: 77.49
    },
    {
      sl: 3,
      year: 1991,
      rural_population: 819486,
      rural_sex_ratio: 917,
      urban_population: 181837,
      urban_sex_ratio: 917,
      total_population: 1001323,
      total_sex_ratio: 917,
      growth_female: 56.08,
      growth_male: 74.96,
      growth_person: 120.95
    },
    {
      sl: 4,
      year: 2001,
      rural_population: 1434561,
      rural_sex_ratio: 916,
      urban_population: 212688,
      urban_sex_ratio: 916,
      total_population: 1647249,
      total_sex_ratio: 916,
      growth_female: 64.53,
      growth_male: 82.99,
      growth_person: 119.90
    },
    {
      sl: 5,
      year: 2011,
      rural_population: 1407536,
      rural_sex_ratio: 940,
      urban_population: 570253,
      urban_sex_ratio: 940,
      total_population: 1978502,
      total_sex_ratio: 940,
      growth_female: "(-)0.58",
      growth_male: 3.29,
      growth_person: 11.16
    }
  ];

  function showP1Table() {
    status.style.display = "none";
    select.disabled = false;
    select.innerHTML = `<option>P-1</option>`;

    sheetTitle.innerHTML = `
      Table 2.1: Rural-Urban Distribution of Sex Ratio and Decadal Growth Rate
      <br>
      <span style="font-weight:400;">of Population of Post Statehood Nagaland</span>
    `;

    sheetInfo.textContent = `${p1Data.length} records`;

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Sl. No.</th>
            <th>Year</th>
            <th>Rural Population</th>
            <th>Rural Sex Ratio</th>
            <th>Urban Population</th>
            <th>Urban Sex Ratio</th>
            <th>Total Population</th>
            <th>Total Sex Ratio</th>
            <th>Female Growth %</th>
            <th>Male Growth %</th>
            <th>Person Growth %</th>
          </tr>
        </thead>

        <tbody>
          ${p1Data.map(row => `
            <tr>
              <td>${row.sl}</td>
              <td>${row.year}</td>
              <td>${row.rural_population.toLocaleString()}</td>
              <td>${row.rural_sex_ratio}</td>
              <td>${row.urban_population.toLocaleString()}</td>
              <td>${row.urban_sex_ratio}</td>
              <td>${row.total_population.toLocaleString()}</td>
              <td>${row.total_sex_ratio}</td>
              <td>${row.growth_female}</td>
              <td>${row.growth_male}</td>
              <td>${row.growth_person}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>

      <p style="padding:14px; color:#334155;">
        <b>Source:</b> Directorate of Census Operation, Nagaland: Kohima
      </p>
    `;
  }

  showP1Table();
</script>
</body>
</html>
